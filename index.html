
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitogram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Kitogram">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=K&background=248bcf&color=fff&size=180">
    <style>
        :root {
            --bg-main: #0e1621;
            --bg-box: #182533;
            --bg-sidebar: #17212b;
            --bg-chat: #0e1621;
            --bg-chat-hdr: #17212b;
            --bg-input: #17212b;
            --border-color: #101921;
            --text-main: #f5f5f5;
            --text-sub: #7f91a4;
            --msg-me: #2b5278;
            --msg-them: #182533;
            --msg-text: #ffffff;
            --msg-meta-me: #7e9bb9;
            --reply-bg: rgba(255, 255, 255, 0.04);
            --accent-color: #5288c1;
            --recording-color: #e53935;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { display: flex; height: 100vh; background: var(--bg-main); color: var(--text-main); overflow: hidden; }
/* МОДАЛЬНЫЕ ОКНА */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(4px);
        }

        .box {
            background: var(--bg-box); color: var(--text-main); padding: 25px;
            border-radius: 15px; text-align: center; width: 92%; max-width: 380px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3); display: flex; flex-direction: column; max-height: 90vh;
        }

        .stg-scroll-area { overflow-y: auto; padding-right: 5px; margin: 15px 0; text-align: left; flex: 1; }
        .stg-section { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .stg-section-title { font-size: 12px; font-weight: bold; color: var(--accent-color); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stg-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .stg-row:last-child { margin-bottom: 0; }

        input[type="text"], input[type="password"] {
            width: 100%; padding: 11px; margin: 6px 0; border-radius: 8px; border: 1px solid var(--border-color);
            font-size: 15px; outline: none; background: var(--bg-sidebar); color: var(--text-main);
        }

        button.primary-btn {
            width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none;
            border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; margin-top: 5px; transition: background 0.2s;
        }
        button.primary-btn:disabled { background: #444 !important; cursor: not-allowed; opacity: 0.6; }
        button.secondary-btn { background: #444; width: 100%; padding: 12px; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button.danger-btn { background: #e53935; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: bold; }

        .file-lbl { display: inline-block; padding: 9px 12px; background: rgba(82,136,193,0.15); color: var(--accent-color); border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .preview-avatar { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; margin: 10px auto; display: none; border: 2px solid var(--accent-color); }
   /* САЙДБАР */
        #sidebar { width: 320px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; height: 100%; position: relative; }
        .header { padding: 12px 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: var(--bg-sidebar); }
        .h-left { display: flex; align-items: center; min-width: 0; flex: 1; }
        .my-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #222; margin-right: 10px; flex-shrink: 0; }
        .gear-btn { background: none; border: none; color: var(--accent-color); font-size: 20px; cursor: pointer; padding: 5px; }
        .search-container { padding: 10px 15px; background: var(--bg-main); border-bottom: 1px solid var(--border-color); display: flex; }
        .search-box { position: relative; flex: 1; }
        .search-box input { margin: 0; padding: 8px 12px 8px 34px; font-size: 14px; background: var(--bg-box); border: 1px solid var(--border-color); width: 100%; }
        .search-box::before { content: "🔍"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-sub); }

        #user-list { flex: 1; overflow-y: auto; }
        .contact { display: flex; align-items: center; padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border-color); user-select: none; }
        .contact:hover { background: rgba(255,255,255,0.02); }
        .contact img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #222; margin-right: 12px; flex-shrink: 0; }
        .c-info { flex: 1; min-width: 0; }
        .c-name { font-weight: bold; font-size: 15px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .c-status { font-size: 12px; color: var(--text-sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .c-status.on { color: var(--accent-color); }
        .c-status.typing { color: #31b545; font-weight: bold; animation: pulse 1.5s infinite; }
        .badge { background: #f54242; color: white; font-size: 11px; font-weight: bold; padding: 3px 7px; border-radius: 12px; min-width: 18px; text-align: center; margin-left: 5px;}

        /* ЧАТ */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); height: 100%; position: relative; min-width: 0; }
        .chat-header { padding: 10px 15px; background: var(--bg-chat-hdr); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; min-height: 60px; cursor: pointer; }
        #back-btn { display: none; background: none; border: none; color: var(--accent-color); font-size: 22px; margin-right: 12px; cursor: pointer; }
        .chat-hdr-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 12px; background: #222; display: none; }
        .chat-title-wrap { flex: 1; min-width: 0; }
        .chat-title { font-weight: bold; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-subtitle { font-size: 12px; color: var(--text-sub); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-size: cover; background-position: center; }
        .dt-sep { align-self: center; background: rgba(0,0,0,0.3); color: #fff; font-size: 11px; padding: 3px 9px; border-radius: 10px; margin: 10px 0; font-weight: 500; }

        .msg-wrapper { display: flex; align-items: flex-end; margin-bottom: 6px; max-width: 75%; }
        .msg-wrapper.me { align-self: flex-end; justify-content: flex-end; }
        .msg-wrapper.them { align-self: flex-start; justify-content: flex-start; }
        .msg-sender-avatar { width: 32px; height: 32px; border-radius: 50%; margin-right: 8px; margin-bottom: 2px; cursor: pointer; object-fit: cover; flex-shrink: 0; }
        
        .msg { padding: 6px 10px 7px 10px; border-radius: 12px; position: relative; color: var(--msg-text); line-height: 1.4; word-wrap: break-word; display: flex; flex-direction: column; box-shadow: 0 1px 1.5px rgba(0,0,0,0.3); }
        .msg-wrapper.me .msg { background: var(--msg-me); border-bottom-right-radius: 3px; }
        .msg-wrapper.them .msg { background: var(--msg-them); border-bottom-left-radius: 3px; }
        
        .msg-name { font-weight: bold; font-size: 13px; margin-bottom: 3px; cursor: pointer; }
        .msg-meta { display: flex; align-items: center; justify-content: flex-end; font-size: 10px; color: var(--text-sub); margin-top: 2px; align-self: flex-end; margin-left: 20px; }
        .msg-wrapper.me .msg-meta { color: var(--msg-meta-me); }
        .ticks { margin-left: 4px; font-weight: bold; }

        .reply-sub-block { border-left: 3px solid var(--accent-color); padding: 3px 8px; margin-bottom: 5px; font-size: 13px; background: var(--reply-bg); border-radius: 3px; }
        .reply-sub-sender { font-weight: bold; font-size: 12.5px; }
        .reply-sub-text { opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* МЕДИА СООБЩЕНИЯ */
        .chat-image { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 5px; display: block; object-fit: cover;}
        .video-circle { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; margin-top: 5px; background: #000; border: 2px solid #2b5278; }
        .voice-player { display: flex; align-items: center; gap: 10px; min-width: 180px; background: rgba(0,0,0,0.1); padding: 5px 10px; border-radius: 20px; margin-top: 4px;}
        .voice-play-btn { background: var(--accent-color); color: white; border: none; border-radius: 50%; width: 34px; height: 34px; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        /* ВВОД СООБЩЕНИЯ */
        #reply-preview-bar { display: none; background: var(--bg-sidebar); border-top: 1px solid var(--border-color); padding: 8px 15px; align-items: center; border-left: 4px solid var(--accent-color); }
        .input-area { display: flex; padding: 10px; background: var(--bg-sidebar); border-top: 1px solid var(--border-color); align-items: center; gap: 8px; }
        .input-wrapper { display: flex; align-items: center; background: var(--bg-input); flex: 1; border-radius: 20px; padding: 2px 10px; position: relative; border: 1px solid transparent; }
        .input-wrapper.recording-active { border-color: var(--recording-color); background: rgba(229, 57, 53, 0.05); }
        
        #message-input { flex: 1; background: none; border: none; outline: none; color: var(--text-main); font-size: 16px; padding: 10px 5px; }
        .icon-btn { background: none; border: none; color: var(--text-sub); font-size: 20px; cursor: pointer; padding: 8px; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; transition: color 0.2s; }
        .icon-btn:hover { color: var(--accent-color); }

        #action-btn { color: var(--accent-color); touch-action: none; } /* Важно для pointer событий */
        #action-btn.recording-mode { color: var(--recording-color); animation: pulseScale 1s infinite alternate; }
        #send-btn { display: none; background: var(--accent-color); color: white; border-radius: 50%; }

        /* Индикация записи внутри инпута */
        #recording-status { display: none; align-items: center; gap: 10px; flex: 1; padding: 10px 5px; color: var(--recording-color); font-weight: bold; }
        .record-dot { width: 10px; height: 10px; background: var(--recording-color); border-radius: 50%; animation: pulse 1s infinite; }

        /* КАМЕРА */
        #camera-preview { width: 140px; height: 140px; object-fit: cover; border-radius: 50%; border: 3px solid var(--recording-color); transform: scaleX(-1); background: #000; display: none; position: absolute; bottom: 70px; right: 15px; z-index: 99; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
   /* МЕНЮ И УВЕДОМЛЕНИЯ */
        #context-menu { position: fixed; background: var(--bg-box); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: none; flex-direction: column; z-index: 10005; min-width: 150px; border: 1px solid var(--border-color); overflow: hidden;}
        .context-item { padding: 12px 16px; font-size: 14px; color: var(--text-main); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .context-item:hover { background: rgba(255,255,255,0.05); }

        .list-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .list-item img { width: 36px; height: 36px; border-radius: 50%; margin-right: 10px; object-fit: cover; }
        .list-item-info { flex: 1; text-align: left; }

        @media(max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; z-index: 10; }
            #sidebar.hidden { display: none; }
            #chat-area { width: 100%; }
            #back-btn { display: block; }
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes pulseScale { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
    </style>
</head>
<body>

    <div id="login-screen" class="modal-overlay" style="display:flex;">
        <div class="box">
            <h2 style="margin-bottom:15px;">Вход / Регистрация</h2>
            <img id="login-preview" class="preview-avatar">
            <label class="file-lbl">Выбрать фото
                <input type="file" id="avatar-file" accept="image/*" style="display:none;">
            </label>
            <input type="text" id="username-input" placeholder="Никнейм (без @)">
            <input type="password" id="password-input" placeholder="Пароль">
            <button id="login-submit-btn" class="primary-btn">Войти</button>
        </div>
    </div>

    <div id="prof-modal" class="modal-overlay">
        <div class="box">
            <h2>Профиль</h2>
            <div class="stg-scroll-area">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                    <img id="modal-preview" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
                    <label class="file-lbl" style="margin:0;">Изменить фото<input type="file" id="modal-avatar-file" accept="image/*" style="display:none;"></label>
                </div>
                <input type="text" id="modal-display-name-input" placeholder="Имя">
                <div class="stg-section" style="margin-top:10px;">
                    <div class="stg-row">
                        <span>Цвет ваших сообщений:</span>
                        <input type="color" id="modal-color-input" style="padding:0; height:30px; width:50px; border:none; background:none; cursor:pointer;">
                    </div>
                </div>
            </div>
            <button id="modal-save-btn" class="primary-btn">Сохранить</button>
            <button id="modal-logout-btn" class="secondary-btn" style="background:#e53935;">Выйти</button>
            <button id="modal-cancel-btn" class="secondary-btn">Закрыть</button>
        </div>
    </div>

    <div id="group-modal" class="modal-overlay">
        <div class="box">
            <h2>Создать беседу</h2>
            <div class="stg-scroll-area">
                <img id="group-preview" class="preview-avatar">
                <label class="file-lbl">Фото беседы<input type="file" id="group-avatar-file" accept="image/*" style="display:none;"></label>
                <input type="text" id="group-name-input" placeholder="Название беседы">
                <div class="stg-section-title" style="margin-top:15px;">Выберите участников:</div>
                <div id="group-contacts-list"></div>
            </div>
            <button id="group-submit-btn" class="primary-btn" disabled>Создать</button>
            <button id="group-cancel-btn" class="secondary-btn">Отмена</button>
        </div>
    </div>
<div id="members-modal" class="modal-overlay">
        <div class="box">
            <h2 id="members-modal-title" style="margin-bottom:10px;">Информация</h2>
            <div class="stg-scroll-area" style="margin-top:0;">
                
                <div id="group-admin-zone" style="display:none; margin-bottom:15px;">
                    <div class="stg-section-title">Управление беседой</div>
                    <input type="text" id="edit-group-name-input" placeholder="Название">
                    <button id="save-group-name-btn" class="primary-btn" style="padding:8px;">Сохранить название</button>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <label class="file-lbl" style="flex:1; margin:0; font-size:12px;">Сменить фото<input type="file" id="edit-group-avatar-file" accept="image/*" style="display:none;"></label>
                        <label class="file-lbl" style="flex:1; margin:0; font-size:12px; background:rgba(49,181,69,0.15); color:#31b545;">Поставить фон<input type="file" id="edit-group-bg-file" accept="image/*" style="display:none;"></label>
                    </div>
                </div>

                <div id="group-member-zone" style="display:none; margin-bottom:15px;">
                    <label class="file-lbl" style="width:100%; margin:0; background:rgba(49,181,69,0.15); color:#31b545;">Предложить фон беседы<input type="file" id="propose-group-bg-file" accept="image/*" style="display:none;"></label>
                </div>

                <div id="dm-settings-zone" style="display:none; margin-bottom:15px;">
                    <div class="stg-section-title">Настройки фона</div>
                    <label class="file-lbl" style="width:100%;">Установить личный фон<input type="file" id="local-bg-file" accept="image/*" style="display:none;"></label>
                    <button id="reset-local-bg-btn" class="danger-btn" style="width:100%; display:none; padding:10px; margin-bottom:10px;">Сбросить личный фон</button>
                    <label class="file-lbl" style="width:100%; background:rgba(49,181,69,0.15); color:#31b545; margin:0;">Предложить общий фон<input type="file" id="shared-bg-file" accept="image/*" style="display:none;"></label>
                </div>

                <div id="members-list-container" style="display:none;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="stg-section-title" style="margin:0;">Участники</div>
                        <button id="add-member-trigger-btn" class="primary-btn" style="width:auto; padding:4px 8px; margin:0; font-size:12px; background:#31b545;">+ Добавить</button>
                    </div>
                    <div id="add-member-zone" style="display:none; margin-top:10px; border:1px solid var(--border-color); padding:10px; border-radius:8px;">
                        <div id="available-to-add-list" style="max-height:100px; overflow-y:auto;"></div>
                        <button id="close-add-member-btn" class="secondary-btn" style="padding:6px; font-size:12px;">Отмена</button>
                    </div>
                    <div id="members-list" style="margin-top:10px;"></div>
                </div>

            </div>
            <button id="members-close-btn" class="secondary-btn">Закрыть</button>
        </div>
    </div>

    <div id="forward-modal" class="modal-overlay">
        <div class="box">
            <h3>Переслать сообщение</h3>
            <div id="forward-chats-list" class="stg-scroll-area"></div>
 <button id="forward-cancel-btn" class="secondary-btn">Отмена</button>
        </div>
    </div>

    <div id="context-menu">
        <div class="context-item" id="ctx-reply">Ответить <i class="fa-solid fa-reply"></i></div>
        <div class="context-item" id="ctx-forward">Переслать <i class="fa-solid fa-share"></i></div>
        <div class="context-item" id="ctx-delete-me">Удалить у себя <i class="fa-solid fa-trash"></i></div>
        <div class="context-item" id="ctx-delete-all" style="color:#e53935; display:none;">Удалить у всех <i class="fa-solid fa-fire"></i></div>
    </div>

    <div id="sidebar">
        <div class="header">
            <div class="h-left">
                <img id="my-avatar" class="my-avatar">
                <div style="min-width:0; flex:1;">
                    <div id="my-name" style="font-weight:bold; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Загрузка...</div>
                    <div id="my-usertag" style="color:var(--text-sub); font-size:12px;">@username</div>
                </div>
            </div>
            <div style="display:flex; gap:4px;">
                <button class="gear-btn" id="create-group-trigger"><i class="fa-solid fa-users"></i></button>
                <button class="gear-btn" id="my-profile-trigger"><i class="fa-solid fa-gear"></i></button>
            </div>
        </div>
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="search-user-input" placeholder="Поиск (введите имя без @)...">
            </div>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-area">
        <div class="chat-header" id="chat-header-clickable">
            <button id="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
            <img id="chat-avatar" class="chat-hdr-avatar">
            <div class="chat-title-wrap">
                <div id="chat-title" class="chat-title">Выберите чат</div>
                <div id="chat-subtitle" class="chat-subtitle"></div>
            </div>
            <button class="gear-btn" id="chat-settings-trigger" style="display:none;"><i class="fa-solid fa-ellipsis-vertical"></i></button>
        </div>
        
        <div id="messages"></div>
        <video id="camera-preview" autoplay muted playsinline></video>

        <div id="reply-preview-bar">
            <div id="reply-preview-text"></div>
            <button id="reply-close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <form id="message-form" class="input-area" autocomplete="off">
            <button type="button" class="icon-btn" id="attach-btn"><i class="fa-solid fa-paperclip"></i></button>
            <input type="file" id="file-input" accept="image/*" style="display:none;">
            
            <div class="input-wrapper" id="input-container-block">
                <input type="text" id="message-input" placeholder="Сообщение...">
                <div id="recording-status">
                    <div class="record-dot"></div>
                    <span id="recording-text">Запись аудио...</span>
                    <span id="recording-timer" style="margin-left:auto;">0:00</span>
                </div>
            </div>

            <button type="button" class="icon-btn" id="action-btn"><i class="fa-solid fa-microphone"></i></button>
            <button type="submit" class="icon-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, get, push, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtdqpLLsbOlvQlXG_EeQUZlr5qo57poI",
            authDomain: "messenger-2e22b.firebaseapp.com",
            databaseURL: "https://messenger-2e22b-default-rtdb.firebaseio.com",
            projectId: "messenger-2e22b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
// --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
        let user = null, displayName = null, avatar = null, userColor = '#5288c1';
        let mode = 'sidebar', activeChat = null, activeChatName = '', activeChatAvatar = '';
        
        let knownUsers = {}, activeConversations = {}, activeGroups = {}, onlineStatus = {};
        let groupAvatarBase64 = null;
        let isNetworkOnline = true;

        // Контекстное меню
        let selectedMsgId = null, selectedMsgText = null, selectedMsgSender = null;
        let replyToId = null, replyToName = null, replyToText = null;

        // Запись медиа (Telegram Style)
        let recordingMode = 'audio'; // 'audio' или 'video'
        let isRecording = false;
        let pressTimer = null;
        let recordInterval = null;
        let recordSeconds = 0;
        let mediaRecorder = null;
        let mediaChunks = [];
        let activeStream = null;

        const $ = id => document.getElementById(id);
        const safeListen = (id, ev, cb) => { const el = $(id); if(el) el.addEventListener(ev, cb); };

        // Очистка юзернейма
        function sanitizeUser(u) {
            if(!u) return '';
            return u.trim().toLowerCase().replace(/@/g, '').replace(/[^a-z0-9_]/g, '');
        }

        // --- ИНИЦИАЛИЗАЦИЯ И СЕТЬ ---
        onValue(ref(db, '.info/connected'), (snap) => {
            isNetworkOnline = snap.val() === true;
            updateChatSubtitle();
        });

        async function login() {
            let uInput = sanitizeUser($('username-input').value);
            let pInput = $('password-input').value.trim();
            if(!uInput || !pInput) return alert('Заполните логин и пароль!');
            if(uInput === 'undefined' || uInput === 'null' || uInput === 'system') return alert('Недопустимое имя!');

            $('login-submit-btn').disabled = true;
            const snap = await get(ref(db, `users/${uInput}`));
            const previewSrc = $('login-preview').src;
            const finalAv = (previewSrc && previewSrc.startsWith('data:')) ? previewSrc : `https://ui-avatars.com/api/?name=${encodeURIComponent(uInput)}&background=random`;

            if (snap.exists()) {
                const data = snap.val();
                if (data.password !== pInput) {
                    alert('Неверный пароль!');
                    $('login-submit-btn').disabled = false;
                    return;
                }
                user = uInput;
                displayName = data.displayName || uInput;
                avatar = data.avatar || finalAv;
                userColor = data.userColor || '#5288c1';
            } else {
                user = uInput;
                displayName = uInput;
                avatar = finalAv;
                await set(ref(db, `users/${user}`), { username: user, displayName: user, avatar: avatar, password: pInput, userColor: userColor, online: true });
            }

            if ($('remember-me').checked) {
                localStorage.setItem('c_nk', user);
                localStorage.setItem('c_pv', pInput);
            }
            initApp();
        }

        function initApp() {
            $('login-screen').style.display = 'none';
            $('my-name').innerText = displayName;
            $('my-usertag').innerText = '@' + user;
            $('my-avatar').src = avatar;

            const myOnlineRef = ref(db, `users/${user}/online`);
            set(myOnlineRef, true);
            onDisconnect(myOnlineRef).set(false);

            // Грузим юзеров, фильтруем багованные
            onValue(ref(db, 'users'), snap => {
                const data = snap.val() || {};
                knownUsers = {};
                Object.keys(data).forEach(k => {
                    if (k && k !== 'undefined' && k !== 'null') {
                        knownUsers[k] = data[k];
                        onlineStatus[k] = data[k].online || false;
                    }
                });
                renderSidebar();
            });

            // Грузим диалоги (только если есть сообщения)
            onValue(ref(db, 'messages'), snap => {
                let tempConvs = {};
                snap.forEach(room => {
                    const rKey = room.key;
                    if (rKey.includes('_') && rKey.includes(user)) {
                        const parts = rKey.split('_');
                        const targetUser = parts[0] === user ? parts[1] : parts[0];
                        
                        if (targetUser && targetUser !== 'undefined' && knownUsers[targetUser]) {
                            let unread = 0; let lastMsg = null;
                            room.forEach(msg => {
                                const m = msg.val();
                                if (m.sender !== user && !m.read) unread++;
                                lastMsg = m;
                            });
                            tempConvs[targetUser] = { user: knownUsers[targetUser], unreadCount: unread, lastMsg: lastMsg, timestamp: lastMsg ? lastMsg.timestamp : 0 };
                        }
                    }
                });
                activeConversations = tempConvs;
                renderSidebar();
            });

   // Грузим группы
            onValue(ref(db, 'groups'), snap => {
                let tempGroups = {};
                snap.forEach(g => {
                    const gData = g.val();
                    if (gData && gData.members && gData.members[user]) {
                        tempGroups[g.key] = gData;
                        // Вешаем локальный слушатель сообщений группы для LastMsg
                        onValue(ref(db, `messages/${g.key}`), mSnap => {
                            let unread = 0; let lastMsg = null;
                            mSnap.forEach(msg => {
                                const m = msg.val();
                                if (m.sender !== user && !m.read) unread++;
                                lastMsg = m;
                            });
                            if (activeGroups[g.key]) {
                                activeGroups[g.key].unreadCount = unread;
                                activeGroups[g.key].lastMsg = lastMsg;
                                activeGroups[g.key].timestamp = lastMsg ? lastMsg.timestamp : 0;
                                renderSidebar();
                            }
                        });
                    }
                });
                activeGroups = tempGroups;
                renderSidebar();
                applyChatBackground();
            });
        }

        // --- РЕНДЕР САЙДБАРА ---
        function renderSidebar() {
            const list = $('user-list');
            list.innerHTML = '';
            const searchVal = sanitizeUser($('search-user-input').value);

            let items = [];
            Object.values(activeConversations).forEach(c => { items.push({ type: 'dm', id: c.user.username, name: c.user.displayName, av: c.user.avatar, unread: c.unreadCount, ts: c.timestamp, lastMsg: c.lastMsg, obj: c.user }); });
            Object.keys(activeGroups).forEach(gld => { const g = activeGroups[gld]; items.push({ type: 'group', id: gld, name: g.name, av: g.avatar, unread: g.unreadCount||0, ts: g.timestamp||0, lastMsg: g.lastMsg, obj: g }); });

            items.sort((a,b) => b.ts - a.ts);

            if (searchVal) {
                items = items.filter(i => i.name.toLowerCase().includes(searchVal) || i.id.toLowerCase().includes(searchVal));
                
                // Если ищем глобально и юзер есть в базе
                if (knownUsers[searchVal] && searchVal !== user && !activeConversations[searchVal]) {
                    items.push({ type: 'dm', id: searchVal, name: knownUsers[searchVal].displayName, av: knownUsers[searchVal].avatar, unread: 0, ts: 0, lastMsg: null, obj: knownUsers[searchVal] });
                }
            }

            if (items.length === 0) {
                list.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-sub); font-size:13px;">Диалогов нет.<br>Введите никнейм в поиск.</div>`;
                return;
            }

            items.forEach(i => {
                let statusText = i.type === 'group' ? `${Object.keys(i.obj.members||{}).length} участников` : (onlineStatus[i.id] ? 'в сети' : 'офлайн');
                let statusClass = (i.type === 'group' || onlineStatus[i.id]) ? 'on' : '';
                
                let lastTxt = "";
                if (i.lastMsg) {
                    let prefix = i.lastMsg.sender === user ? 'Вы: ' : '';
                    let content = i.lastMsg.type === 'text' ? i.lastMsg.text : '[Медиа]';
                    lastTxt = prefix + content;
                }

                list.innerHTML += `
                    <div class="contact" onclick="window.openChat('${i.id}', '${i.name.replace(/'/g,"")}', '${i.av}')">
                        <img src="${i.av || 'https://ui-avatars.com/api/?name=U'}">
                        <div class="c-info">
                            <div class="c-name">${i.name}</div>
                            <div class="c-status ${statusClass}">${lastTxt || statusText}</div>
                        </div>
                        ${i.unread > 0 ? `<div class="badge">${i.unread}</div>` : ''}
                    </div>
                `;
            });
        }

        $('search-user-input').addEventListener('input', renderSidebar);

        // --- ЛОГИКА ЧАТА ---
        window.openChat = function(id, name, av) {
            activeChat = id;
            activeChatName = name;
            activeChatAvatar = av;
            mode = id.startsWith('group_') ? id : [user, id].sort().join('_');

            $('chat-avatar').src = av;
            $('chat-avatar').style.display = 'block';
            $('chat-title').innerText = name;
            $('chat-settings-trigger').style.display = 'block';

            if (window.innerWidth <= 768) $('sidebar').classList.add('hidden');
  // Подписка на печать
            if (window.unsubTyping) window.unsubTyping();
            window.unsubTyping = onValue(ref(db, `typing/${mode}`), snap => {
                const data = snap.val() || {};
                let typists = [];
                for (let u in data) if (u !== user && data[u]) typists.push(knownUsers[u]?.displayName || u);
                updateChatSubtitle(typists);
            });

            applyChatBackground();
            loadMsgs();
        };

        function updateChatSubtitle(typists = []) {
            const sub = $('chat-subtitle');
            if (!sub || !activeChat) return;

            if (typists.length > 0) {
                sub.innerText = `${typists.join(', ')} печатает...`;
                sub.style.color = '#31b545';
                return;
            }

            sub.style.color = 'var(--text-sub)';
            if (!isNetworkOnline) { sub.innerText = 'Ожидание сети...'; sub.style.color = '#e53935'; return; }

            if (activeChat.startsWith('group_')) {
                const g = activeGroups[activeChat];
                sub.innerText = g ? `${Object.keys(g.members||{}).length} участников` : '';
            } else {
                sub.innerText = onlineStatus[activeChat] ? 'в сети' : 'был(а) недавно';
                if (onlineStatus[activeChat]) sub.style.color = 'var(--accent-color)';
            }
        }

        function applyChatBackground() {
            const msgArea = $('messages');
            if (!activeChat) return;
            let bg = localStorage.getItem('bg_' + mode); // Личный
            
            if (activeChat.startsWith('group_')) {
                if (activeGroups[activeChat]?.background) bg = activeGroups[activeChat].background; // Принудительный фон группы
            }
            // Здесь можно добавить проверку на SharedBackgrounds для ЛС из БД, если нужно
            
            msgArea.style.backgroundImage = bg ? `url(${bg})` : 'none';
        }

        function loadMsgs() {
            if (window.unsubMsgs) window.unsubMsgs();
            window.unsubMsgs = onValue(ref(db, `messages/${mode}`), snap => {
                const box = $('messages');
                box.innerHTML = '';
                let lastDate = "";

                snap.forEach(child => {
                    const d = child.val();
                    const key = child.key;
                    if (d.sender !== user && !d.read) update(ref(db, `messages/${mode}/${key}`), { read: true });

                    let dStr = new Date(d.timestamp).toLocaleDateString('ru');
                    if (dStr !== lastDate) {
                        box.innerHTML += `<div class="dt-sep">${dStr}</div>`;
                        lastDate = dStr;
                    }

                    const isMe = d.sender === user;
                    const timeStr = new Date(d.timestamp).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
                    
                    let content = d.text;
                    if (d.type === 'image') content = `<img src="${d.mediaUrl}" class="chat-image">`;
                    if (d.type === 'audio') content = `<div class="voice-player"><button class="voice-play-btn" onclick="window.playAudio('${d.mediaUrl}')"><i class="fa-solid fa-play"></i></button><span style="font-size:12px;">Голосовое</span></div>`;
                    if (d.type === 'video') content = `<video src="${d.mediaUrl}" class="video-circle" controls playsinline webkit-playsinline></video>`;
                    if (d.type === 'bg_proposal') {
                        content = `<div style="font-size:12px; font-style:italic;">Предложение фона:</div><img src="${d.proposalBg}" style="max-width:120px; border-radius:8px;"><br>`;
                        if (d.status === 'accepted') content += `<b style="color:#31b545; font-size:12px;">Принято</b>`;
                        else if (d.status === 'rejected') content += `<b style="color:#e53935; font-size:12px;">Отклонено</b>`;
                        else if (!isMe) content += `<button onclick="window.resolveBg('${key}', true)" style="background:#31b545; padding:4px; font-size:11px; border:none; border-radius:4px; color:white; margin-top:4px;">Принять</button>`;
                    }

                    let replyHTML = d.replyToId ? `<div class="reply-sub-block"><div class="reply-sub-sender">${d.replyToName}</div><div class="reply-sub-text">${d.replyToText}</div></div>` : '';
                    let nameHTML = (!isMe && activeChat.startsWith('group_')) ? `<div class="msg-name" style="color:${d.senderColor}">${d.senderName}</div>` : '';
                    let avatarHTML = (!isMe && activeChat.startsWith('group_')) ? `<img src="${knownUsers[d.sender]?.avatar||''}" class="msg-sender-avatar" onclick="window.openDirect('${d.sender}')">` : '';

                    box.innerHTML += `
                        <div class="msg-wrapper ${isMe?'me':'them'}" data-id="${key}" data-txt="${d.type==='text'?d.text:'Медиа'}" data-sender="${d.sender}">
                            ${avatarHTML}
                            <div class="msg">
                                ${nameHTML}
                                ${replyHTML}
                                ${content}
                                <div class="msg-meta"><span>${timeStr}</span><span class="ticks">${isMe ? (d.read?'✓✓':'✓') : ''}</span></div>
                            </div>
                        </div>
                    `;
                });
                box.scrollTop = box.scrollHeight;
                // Навешиваем меню
                document.querySelectorAll('.msg-wrapper').forEach(el => {
                    el.oncontextmenu = (e) => { e.preventDefault(); window.showMenu(e, el); };
                    el.addEventListener('touchstart', e => { pressTimer = setTimeout(() => window.showMenu(e.touches[0], el), 500); }, {passive:true});
                    el.addEventListener('touchend', () => clearTimeout(pressTimer));
                    el.addEventListener('touchmove', () => clearTimeout(pressTimer));
                });
            });
        }

        window.openDirect = function(u) {
            if(u === user) return;
            $('#members-modal').style.display = 'none';
            const ud = knownUsers[u];
            window.openChat(u, ud.displayName, ud.avatar);
        };

        window.playAudio = function(url) {
            if (window.currAudio) window.currAudio.pause();
            window.currAudio = new Audio(url);
            window.currAudio.play();
        };

        window.resolveBg = async function(msgId, accept) {
            await update(ref(db, `messages/${mode}/${msgId}`), { status: accept ? 'accepted' : 'rejected' });
            if (accept) {
                const snap = await get(ref(db, `messages/${mode}/${msgId}`));
                localStorage.setItem('bg_' + mode, snap.val().proposalBg);
                applyChatBackground();
            }
        };

        function sendMessage(text, type = 'text', mediaUrl = null) {
            if (type === 'text' && !text) return;
            const payload = {
                sender: user, senderName: displayName, senderColor: userColor,
                type: type, text: text, mediaUrl: mediaUrl, timestamp: Date.now(), read: false
            };
            if (replyToId) { payload.replyToId = replyToId; payload.replyToName = replyToName; payload.replyToText = replyToText; cancelReply(); }
            push(ref(db, `messages/${mode}`), payload);
            if(type === 'text') $('#message-input').value = '';
            toggleInputButtons();
        }

        // --- ВВОД, КНОПКИ И МЕДИА ЗАПИСИ ---
        $('#message-input').addEventListener('input', () => {
            toggleInputButtons();
            set(ref(db, `typing/${mode}/${user}`), true);
            clearTimeout(window.typeT);
            window.typeT = setTimeout(() => set(ref(db, `typing/${mode}/${user}`), null), 1500);
        });

        function toggleInputButtons() {
            const hasText = $('#message-input').value.trim().length > 0;
            $('#action-btn').style.display = hasText ? 'none' : 'flex';
            $('#send-btn').style.display = hasText ? 'flex' : 'none';
        }

        $('#message-form').addEventListener('submit', e => { e.preventDefault(); sendMessage($('#message-input').value.trim()); });

        // ЛОГИКА КНОПКИ МИКРОФОНА/КАМЕРЫ (КАК В ТГ)
        const actionBtn = $('#action-btn');
        let recordTimeout = null;

        actionBtn.addEventListener('pointerdown', e => {
            if ($('#message-input').value.trim().length > 0) return;
            e.preventDefault();
            // Ждем 300мс перед стартом записи, чтобы отличить от клика
            recordTimeout = setTimeout(() => {
                startMediaRecord();
            }, 300);
        });

        actionBtn.addEventListener('pointerup', e => {
            e.preventDefault();
            clearTimeout(recordTimeout);
            if (isRecording) {
                stopMediaRecord(true); // Сохранить и отправить
            } else {
                // Это был короткий клик -> Переключаем режим
                recordingMode = recordingMode === 'audio' ? 'video' : 'audio';
                actionBtn.innerHTML = recordingMode === 'audio' ? '<i class="fa-solid fa-microphone"></i>' : '<i class="fa-solid fa-video"></i>';
            }
        });
        actionBtn.addEventListener('pointerleave', () => {
            clearTimeout(recordTimeout);
            if(isRecording) stopMediaRecord(false); // Отмена при уводе пальца
        });

        async function startMediaRecord() {
            isRecording = true;
            recordSeconds = 0;
            $('#message-input').style.display = 'none';
            $('#attach-btn').style.display = 'none';
            $('#recording-status').style.display = 'flex';
            $('#recording-text').innerText = recordingMode === 'audio' ? 'Запись аудио...' : 'Запись видео...';
            $('#recording-timer').innerText = '0:00';
            actionBtn.classList.add('recording-mode');
            $('#input-container-block').classList.add('recording-active');

            recordInterval = setInterval(() => {
                recordSeconds++;
                let m = Math.floor(recordSeconds / 60);
                let s = recordSeconds % 60;
                $('#recording-timer').innerText = `${m}:${s<10?'0':''}${s}`;
            }, 1000);

            let constraints = recordingMode === 'audio' ? { audio: true } : { audio: true, video: { facingMode: 'user' } };
            
            try {
                activeStream = await navigator.mediaDevices.getUserMedia(constraints);
                if (recordingMode === 'video') {
                    $('#camera-preview').srcObject = activeStream;
                    $('#camera-preview').style.display = 'block';
                }

                // Apple Safari Fix
                let mime = recordingMode === 'audio' ? 'audio/webm' : 'video/webm';
                if (recordingMode === 'audio' && MediaRecorder.isTypeSupported('audio/mp4')) mime = 'audio/mp4';
                if (recordingMode === 'video' && MediaRecorder.isTypeSupported('video/mp4')) mime = 'video/mp4';

                mediaRecorder = new MediaRecorder(activeStream, { mimeType: mime });
                mediaChunks = [];
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) mediaChunks.push(e.data); };
                mediaRecorder.start();

            } catch (err) {
                alert("Ошибка доступа к медиа: " + err.message);
                stopMediaRecord(false);
            }
        }

        function stopMediaRecord(shouldSave) {
            isRecording = false;
            clearInterval(recordInterval);
            $('#message-input').style.display = 'block';
            $('#attach-btn').style.display = 'flex';
            $('#recording-status').style.display = 'none';
            actionBtn.classList.remove('recording-mode');
            $('#input-container-block').classList.remove('recording-active');
            
            if ($('#camera-preview').srcObject) {
                $('#camera-preview').srcObject.getTracks().forEach(t => t.stop());
                $('#camera-preview').srcObject = null;
                $('#camera-preview').style.display = 'none';
            }

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.onstop = () => {
                    if (shouldSave && recordSeconds >= 1) {
                        const blob = new Blob(mediaChunks, { type: mediaRecorder.mimeType });
                        const r = new FileReader();
                        r.onload = () => sendMessage('', recordingMode, r.result);
                        r.readAsDataURL(blob);
                    }
                };
                mediaRecorder.stop();
            }
            if (activeStream) activeStream.getTracks().forEach(t => t.stop());
        }

        // --- КОНТЕКСТНОЕ МЕНЮ И ШАПКА ---
        window.showMenu = function(e, el) {
            selectedMsgId = el.getAttribute('data-id');
            selectedMsgText = el.getAttribute('data-txt');
            selectedMsgSender = el.getAttribute('data-sender');

            const menu = $('#context-menu');
            menu.style.display = 'flex';
            menu.style.left = (e.clientX || e.pageX) + 'px';
            menu.style.top = (e.clientY || e.pageY) + 'px';

            $('#ctx-delete-all').style.display = (selectedMsgSender === user) ? 'flex' : 'none';
        };

        document.addEventListener('click', e => { if(!e.target.closest('#context-menu') && !e.target.closest('.msg-wrapper')) $('#context-menu').style.display = 'none'; });

        safeListen('ctx-reply', 'click', () => {
            replyToId = selectedMsgId; replyToText = selectedMsgText; replyToName = knownUsers[selectedMsgSender]?.displayName || 'User';
            $('#reply-preview-text').innerText = replyToText;
            $('#reply-preview-bar').style.display = 'flex';
            $('#context-menu').style.display = 'none';
        });

        safeListen('reply-close-btn', 'click', cancelReply);
        function cancelReply() { replyToId=null; replyToText=null; replyToName=null; $('#reply-preview-bar').style.display='none'; }

        safeListen('ctx-delete-me', 'click', () => { set(ref(db, `messages/${mode}/${selectedMsgId}`), null); $('#context-menu').style.display='none'; });
        safeListen('ctx-delete-all', 'click', () => { set(ref(db, `messages/${mode}/${selectedMsgId}`), null); $('#context-menu').style.display='none'; });
   // Шапка и настройки чата
        safeListen('chat-header-clickable', 'click', e => {
            if (e.target.closest('#back-btn') || !activeChat) return;
            
            if (activeChat.startsWith('group_')) {
                const g = activeGroups[activeChat];
                if (!g) return;
                $('#members-modal-title').innerText = "О беседе";
                $('#edit-group-name-input').value = g.name;
                
                $('#group-admin-zone').style.display = g.createdBy === user ? 'block' : 'none';
                $('#group-member-zone').style.display = g.createdBy === user ? 'none' : 'block';
                $('#dm-settings-zone').style.display = 'none';
                $('#members-list-container').style.display = 'block';

                const mList = $('#members-list');
                mList.innerHTML = '';
                Object.keys(g.members||{}).forEach(uid => {
                    const ud = knownUsers[uid] || { displayName: uid };
                    const isAdm = uid === g.createdBy ? '👑 Создатель' : 'Участник';
                    const kickBtn = (g.createdBy === user && uid !== user) ? `<button class="danger-btn" onclick="window.kickUser('${uid}')">Исключить</button>` : '';
                    
                    mList.innerHTML += `
                        <div class="list-item" onclick="window.openDirect('${uid}')">
                            <img src="${ud.avatar || 'https://ui-avatars.com/api/?name=U'}">
                            <div class="list-item-info">
                                <div style="font-weight:bold;">${ud.displayName}</div>
                                <div style="font-size:11px; color:var(--text-sub)">${isAdm}</div>
                            </div>
                            <div onclick="event.stopPropagation()">${kickBtn}</div>
                        </div>
                    `;
                });
                $('#members-modal').style.display = 'flex';
            } else {
                $('#members-modal-title').innerText = "Настройки чата";
                $('#group-admin-zone').style.display = 'none';
                $('#group-member-zone').style.display = 'none';
                $('#members-list-container').style.display = 'none';
                $('#dm-settings-zone').style.display = 'block';
                $('#reset-local-bg-btn').style.display = localStorage.getItem('bg_'+mode) ? 'block' : 'none';
                $('#members-modal').style.display = 'flex';
            }
        });

        window.kickUser = async function(uid) {
            if(confirm("Удалить пользователя?")) {
                await set(ref(db, `groups/${activeChat}/members/${uid}`), null);
                $('#members-modal').style.display = 'none';
            }
        };

        safeListen('members-close-btn', 'click', () => $('#members-modal').style.display = 'none');
        
        // Фоны
        safeListen('local-bg-file', 'change', e => {
            const r = new FileReader();
            r.onload = () => { localStorage.setItem('bg_'+mode, r.result); applyChatBackground(); $('#members-modal').style.display='none'; };
            r.readAsDataURL(e.target.files[0]);
        });
        safeListen('reset-local-bg-btn', 'click', () => { localStorage.removeItem('bg_'+mode); applyChatBackground(); $('#members-modal').style.display='none'; });
        safeListen('shared-bg-file', 'change', e => {
            const r = new FileReader();
            r.onload = () => { push(ref(db, `messages/${mode}`), { sender: user, type:'bg_proposal', proposalBg: r.result, status:'pending', timestamp: Date.now() }); $('#members-modal').style.display='none'; alert("Предложение отправлено"); };
            r.readAsDataURL(e.target.files[0]);
        });
        safeListen('edit-group-bg-file', 'change', e => {
            const r = new FileReader();
            r.onload = () => { update(ref(db, `groups/${activeChat}`), { background: r.result }); $('#members-modal').style.display='none'; alert("Фон группы изменен"); };
            r.readAsDataURL(e.target.files[0]);
        });
        safeListen('edit-group-name-input', 'change', e => { update(ref(db, `groups/${activeChat}`), { name: e.target.value.trim() }); });

        // ДОБАВЛЕНИЕ ЛЮДЕЙ В БЕСЕДУ
        safeListen('add-member-trigger-btn', 'click', () => {
            const list = $('#available-to-add-list');
            list.innerHTML = '';
            const g = activeGroups[activeChat];
            Object.keys(activeConversations).forEach(k => {
                if(!g.members[k]) {
                    list.innerHTML += `<div class="list-item" onclick="window.addMember('${k}')"><img src="${activeConversations[k].user.avatar}"><div class="list-item-info"><b>${activeConversations[k].user.displayName}</b></div><button class="primary-btn" style="width:auto; padding:4px 8px; margin:0;">Добавить</button></div>`;
                }
            });
            $('#add-member-zone').style.display = 'block';
        });
        safeListen('close-add-member-btn', 'click', () => $('#add-member-zone').style.display = 'none');
        window.addMember = async function(uid) {
            await update(ref(db, `groups/${activeChat}/members`), { [uid]: true });
            $('#add-member-zone').style.display = 'none';
            $('#members-modal').style.display = 'none';
        };

        // --- СОЗДАНИЕ БЕСЕДЫ ---
        safeListen('create-group-trigger', 'click', () => {
            $('#group-contacts-list').innerHTML = '';
            Object.keys(activeConversations).forEach(k => {
                const u = activeConversations[k].user;
                $('#group-contacts-list').innerHTML += `<label class="stg-row"><span style="display:flex; align-items:center; gap:8px;"><img src="${u.avatar}" style="width:30px; height:30px; border-radius:50%;"><b>${u.displayName}</b></span><input type="checkbox" class="new-gr-cb" value="${k}" style="width:auto;" onchange="window.chkGr()"></label>`;
            });
            $('#group-modal').style.display = 'flex';
        });
        window.chkGr = () => $('#group-submit-btn').disabled = document.querySelectorAll('.new-gr-cb:checked').length < 2;
        safeListen('group-cancel-btn', 'click', () => $('#group-modal').style.display = 'none');
        safeListen('group-avatar-file', 'change', e => {
            const r = new FileReader();
            r.onload = () => { groupAvatarBase64 = r.result; $('group-preview').src = r.result; $('group-preview').style.display='block'; };
            r.readAsDataURL(e.target.files[0]);
        });
        safeListen('group-submit-btn', 'click', async () => {
            const name = $('group-name-input').value.trim();
            if(!name) return alert('Введите название!');
            const gld = 'group_' + Date.now();
            let members = { [user]: true };
            document.querySelectorAll('.new-gr-cb:checked').forEach(cb => members[cb.value] = true);
            await set(ref(db, `groups/${gld}`), { name: name, avatar: groupAvatarBase64||`https://ui-avatars.com/api/?name=${name}`, createdBy: user, members: members, timestamp: Date.now() });
            $('#group-modal').style.display = 'none';
            window.openChat(gld, name, groupAvatarBase64||`https://ui-avatars.com/api/?name=${name}`);
        });
// ПЕРЕСЫЛКА
        safeListen('ctx-forward', 'click', () => {
            $('#context-menu').style.display = 'none';
            const flist = $('#forward-chats-list');
            flist.innerHTML = '';
            Object.keys(activeConversations).forEach(k => {
                const u = activeConversations[k].user;
                flist.innerHTML += `<div class="list-item" onclick="window.fwdTo('${k}')"><img src="${u.avatar}"><b>${u.displayName}</b></div>`;
            });
            Object.keys(activeGroups).forEach(k => {
                const g = activeGroups[k];
                flist.innerHTML += `<div class="list-item" onclick="window.fwdTo('${k}')"><img src="${g.avatar||'https://ui-avatars.com/api/?name=G'}"><b>${g.name}</b></div>`;
            });
            $('#forward-modal').style.display = 'flex';
        });
        window.fwdTo = function(target) {
            const tMode = target.startsWith('group_') ? target : [user, target].sort().join('_');
            push(ref(db, `messages/${tMode}`), { sender: user, senderName: displayName, type: 'text', text: selectedMsgText, fwdFrom: knownUsers[selectedMsgSender]?.displayName||selectedMsgSender, timestamp: Date.now(), read: false });
            $('#forward-modal').style.display = 'none';
            alert('Переслано!');
        };
        safeListen('forward-cancel-btn', 'click', () => $('#forward-modal').style.display='none');

        // ОСТАЛЬНОЕ
        safeListen('login-submit-btn', 'click', login);
        safeListen('avatar-file', 'change', e => { const r = new FileReader(); r.onload=()=>{$('login-preview').src=r.result; $('login-preview').style.display='block';}; r.readAsDataURL(e.target.files[0]); });
        safeListen('modal-logout-btn', 'click', () => { localStorage.clear(); location.reload(); });
        safeListen('my-profile-trigger', 'click', () => { $('modal-preview').src=avatar; $('modal-display-name-input').value=displayName; $('modal-username-input').value='@'+user; $('prof-modal').style.display='flex'; });
        safeListen('modal-cancel-btn', 'click', () => $('#prof-modal').style.display='none');

        const svK = localStorage.getItem('c_nk');
        const svP = localStorage.getItem('c_pv');
        if (svK && svP) {
            user = svK;
            get(ref(db, `users/${user}`)).then(snap => {
                if (snap.exists() && snap.val().password === svP) {
                    const d = snap.val(); displayName = d.displayName||user; avatar = d.avatar||''; userColor = d.userColor||'#5288c1'; initApp();
                } else $('#login-screen').style.display = 'flex';
            }).catch(()=>$('#login-screen').style.display='flex');
        } else $('#login-screen').style.display = 'flex';

    </script>
</body>
</html>
