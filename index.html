<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Firebase Chat PWA</title>
    
    <!-- Подключаем FontAwesome для иконок (микрофон, самолетик, корзина и т.д.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Базовые стили приложения */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0e1621;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app-root {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #17212b;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .hidden { 
            display: none !important; 
        }

        /* Окно авторизации */
        #auth-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 30px;
            box-sizing: border-box;
        }

        #auth-container h2 {
            margin-bottom: 20px;
            font-weight: 500;
        }

        #username-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #2f3e4e;
            background: #24313f;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        #login-btn {
            width: 100%;
            padding: 14px;
            background: #5288c1;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        #login-btn:hover {
            background: #4171a3;
        }

        /* Главный контейнер чата */
        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #17212b;
            border-bottom: 1px solid #101921;
            z-index: 10;
        }

        header span {
            font-weight: bold;
            font-size: 18px;
        }

        #logout-btn {
            background: none;
            border: none;
            color: #ef5350;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Зона сообщений */
        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0e1621;
            /* Сюда можно повесить фоновую картинку как в ТГ */
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 24px 24px;
        }

        /* Стили самих облачков сообщений */
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.4;
            font-size: 15px;
            position: relative;
            word-break: break-word;
            /* Отключаем выделение текста, чтобы долгий тап не вызывал системную лупу на iOS */
            user-select: none;
            -webkit-user-select: none;
        }

        .my-message {
            background-color: #2b5278;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .other-message {
            background-color: #182533;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .author {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #64b5f6;
            margin-bottom: 4px;
        }

        .text {
            color: #f5f5f5;
        }

        .chat-image {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 4px;
            display: block;
        }

        audio {
            max-width: 100%;
            margin-top: 5px;
            display: block;
        }

        .video-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            background: #000;
            display: block;
            margin-top: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Нижняя панель ввода */
        #message-form {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #17212b;
            border-top: 1px solid #101921;
            gap: 10px;
            position: relative;
            box-sizing: border-box;
        }

        #message-input {
            flex-grow: 1;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 8px 2px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #708499;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background 0.2s, color 0.2s;
            touch-action: none; /* Важно для корректного Pointer Events на мобилках */
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
 /* Живой предпросмотр фронталки при записи кружка */
        #camera-preview {
            position: absolute;
            bottom: 75px;
            right: 15px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #5288c1;
            background: #000;
            transform: scaleX(-1); /* Зеркалим фронталку */
            z-index: 99;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* ==========================================
           СТИЛИ ДЛЯ ОВЕРЛЕЕВ ЗАПИСИ, ПРЕВЬЮ И МЕНЮ
           ========================================== */

        /* Плашка активной записи */
        .recording-overlay {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            color: #ef5350;
            font-weight: 500;
            padding: 6px 0;
        }

        .blink-dot {
            width: 10px;
            height: 10px;
            background-color: #ef5350;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .swipe-hint {
            font-size: 13px;
            color: #708499;
            margin-left: auto;
            animation: floatUp 2s infinite ease-in-out;
        }

        @keyframes floatUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Стилизация кнопки при удержании */
        .recording {
            color: #ef5350 !important;
            transform: scale(1.2);
            background: rgba(239, 83, 80, 0.1);
        }

        /* Кнопка зафиксирована свайпом */
        .locked-recording {
            background-color: #ef5350 !important;
            color: #fff !important;
        }

        /* Контейнер предварительного прослушивания */
        .preview-overlay {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .preview-delete-btn {
            background: none;
            border: none;
            color: #ef5350;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        .preview-overlay audio {
            flex-grow: 1;
            height: 32px;
        }

        .video-circle-preview {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #000;
        }

        /* Контекстное меню удаления */
        .context-menu {
            position: absolute;
            background: #1e2530;
            border: 1px solid #2b3648;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 160px;
            animation: fadeIn 0.15s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .context-menu button {
            background: none;
            border: none;
            color: #fff;
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            outline: none;
        }

        .context-menu button:hover {
            background: #273444;
        }

        #del-everyone {
            color: #ff5252;
            font-weight: 500;
            border-bottom: 1px solid #2b3648;
        }
    </style>
</head>
<body>

    <div id="app-root">
        
        <!-- БЛОК АВТОРИЗАЦИИ -->
        <div id="auth-container">
            <h2>Вход в чат</h2>
            <input type="text" id="username-input" placeholder="Ваш никнейм..." autocomplete="off">
            <button id="login-btn">Войти анонимно</button>
        </div>

        <!-- БЛОК ЧАТА -->
        <div id="chat-container" class="hidden">
            <header>
                <span>PWA Chat</span>
                <button id="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i> Выйти
                </button>
            </header>

            <!-- Лента сообщений -->
            <div id="messages"></div>

            <!-- Круглый видоискатель для записи видео-сообщений -->
            <video id="camera-preview" autoplay muted playsinline style="display: none;"></video>
<!-- Панель ввода и отправки -->
            <form id="message-form">
                <!-- Кнопка «Скрепка» -->
                <button type="button" id="attach-btn" class="icon-btn">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                
                <!-- Поле ввода текста -->
                <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
                
                <!-- Универсальная кнопка экшена (Голос / Кружок / Отправка) -->
                <button type="button" id="action-btn" class="icon-btn">
                    <i class="fa-solid fa-microphone"></i>
                </button>
            </form>
        </div>

    </div>

    <!-- Подключаем скрипт логики Firebase и обработчиков -->
    <script type="module" src="app.js"></script>
</body>
</html>
