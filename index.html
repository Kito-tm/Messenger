<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; }
        #chat { height: 60vh; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .msg { padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <input id="input" placeholder="Сообщение...">
    <button onclick="send()">Отправить</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTDqpLLsbolvQlxGEqUZLR561Irsq57Po",
            authDomain: "messenger-2e22b.firebaseapp.com",
            projectId: "messenger-2e22b",
            storageBucket: "messenger-2e22b.firebasestorage.app",
            messagingSenderId: "568767713950",
            appId: "1:568767713950:web:36d347ceaf13a5d865e18f",
            measurementId: "G-HQGTN4Q6HX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.send = async () => {
            let input = document.getElementById('input');
            if (!input.value) return;
            await addDoc(collection(db, "messages"), { text: input.value, timestamp: Date.now() });
            input.value = '';
        };

        onSnapshot(query(collection(db, "messages"), orderBy("timestamp")), (snapshot) => {
            let chat = document.getElementById('chat');
            chat.innerHTML = "";
            snapshot.forEach((doc) => {
                chat.innerHTML += `<div class="msg">${doc.data().text}</div>`;
            });
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
