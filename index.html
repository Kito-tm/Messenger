<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitogram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="modal-overlay" style="display:flex;">
        <div class="box">
            <h2 style="margin-bottom:15px;">Вход / Регистрация</h2>
            <img id="login-preview" class="preview-avatar">
            <label class="file-lbl">Выбрать фото<input type="file" id="avatar-file" accept="image/*" style="display:none;"></label>
            <input type="text" id="username-input" placeholder="Никнейм (без @)">
            <input type="password" id="password-input" placeholder="Пароль">
            <button id="login-submit-btn" class="primary-btn">Войти</button>
        </div>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
