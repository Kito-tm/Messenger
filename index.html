<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Media Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="auth-wrapper">
        <div class="auth-card">
            <i class="fa-solid fa-user-shield" style="font-size: 3rem; color: #248bcf; margin-bottom: 15px;"></i>
            <h2>Вход в чат</h2>
            <input type="text" id="username-input" placeholder="Введите ваш никнейм">
            <button id="login-btn">Войти анонимно</button>
        </div>
    </div>

    <div id="chat-container" class="chat-wrapper hidden">
        <div class="chat-header">
            <h3>Media Chat Room</h3>
            <button id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Выйти</button>
        </div>

        <video id="camera-preview" autoplay muted playsinline style="display: none;"></video>

        <div id="messages" class="messages-box"></div>

        <form id="message-form" class="input-panel">
            <button type="button" id="attach-btn"><i class="fa-solid fa-paperclip"></i></button>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            
            <input type="text" id="message-input" placeholder="Напишите сообщение..." autocomplete="off">
            
            <button type="button" id="action-btn"><i class="fa-solid fa-microphone"></i></button>
        </form>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
