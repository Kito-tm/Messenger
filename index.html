<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: #e5ddd5; }
        
        /* Экран входа */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #login-screen input { margin: 10px 0; padding: 12px; width: 250px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        #login-screen button { padding: 12px 20px; background: #0088cc; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 250px; }
        #login-screen button:hover { background: #006699; }

        /* Боковая панель (Список контактов) */
        #sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #f0f0f0; font-weight: bold; border-bottom: 1px solid #ddd; display: flex; align-items: center; }
        #user-list { flex: 1; overflow-y: auto; }
        .contact { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f5f5f5; transition: 0.2s; }
        .contact:hover, .contact.active { background: #ebebeb; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #ccc; }
        .contact-info { flex: 1; }
        .contact-name { font-weight: bold; font-size: 15px; margin-bottom: 3px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; margin-left: auto; }
        .status-dot.online { background: #4caf50; } /* Зеленый, когда в сети */

        /* Зона чата */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        #chat-header { padding: 15px 20px; background: #f0f0f0; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 18px; display: flex; align-items: center;}
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* Дизайн сообщений */
        .msg-wrapper { display: flex; margin-bottom: 15px; flex-direction: column; }
        .msg-wrapper.me { align-items: flex-end; }
        .msg-wrapper.them { align-items: flex-start; }
        .msg-sender { font-size: 12px; color: #666; margin-bottom: 2px; margin-left: 5px; margin-right: 5px;}
        .msg-bubble { max-width: 70%; padding: 10px 15px; border-radius: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .msg-wrapper.me .msg-bubble { background: #dcf8c6; border-bottom-right-radius: 0; }
        .msg-wrapper.them .msg-bubble { background: #ffffff; border-bottom-left-radius: 0; }

        /* Поле ввода */
        #input-area { display: flex; padding: 15px; background: #f0f0f0; align-items: center; }
        #message-input { flex: 1; padding: 15px; border-radius: 30px; border: 1px solid #ccc; outline: none; font-size: 15px; }
        #send-btn { margin-left: 15px; padding: 15px 25px; border-radius: 30px; background: #0088cc; color: white; border: none; cursor: pointer; font-weight: bold; }
        #send-btn:hover { background: #006699; }

        @media (max-width: 600px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 30%; border-right: none; border-bottom: 2px solid #ccc; }
            #chat-area { height: 70%; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="margin-bottom: 10px;">Вход в мессенджер</h2>
    <input type="text" id="nickname-input" placeholder="Ваш никнейм (обязательно)">
    <input type="text" id="avatar-input" placeholder="URL аватарки (необязательно)">
    <button onclick="login()">Войти</button>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <img id="my-avatar" src="https://via.placeholder.com/45" class="avatar">
        <span id="my-name">Мой профиль</span>
    </div>
    <div id="user-list">
        </div>
</div>

<div id="chat-area">
    <div id="chat-header">
        Общий чат
    </div>
    <div id="messages">
        </div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Напишите сообщение...">
        <button id="send-btn" onclick="sendMessage()">Отправить</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // ВАШИ КЛЮЧИ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyCTDqpLLsbolvQlxGEqUZLR561Irsq57Po",
        authDomain: "messenger-2e22b.firebaseapp.com",
        projectId: "messenger-2e22b",
        storageBucket: "messenger-2e22b.firebasestorage.app",
        messagingSenderId: "568767713950",
        appId: "1:568767713950:web:36d347ceaf13a5d865e18f",
        measurementId: "G-HQGTN4Q6HX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = localStorage.getItem('chat_nickname');
    let currentAvatar = localStorage.getItem('chat_avatar') || 'https://i.pravatar.cc/150?img=3';
    let currentChatMode = 'global'; // 'global' или ID приватного чата
    let currentChatName = 'Общий чат';
    let messagesListener = null; // Отслеживает подписку на чат

    // Функция входа
    window.login = () => {
        const nick = document.getElementById('nickname-input').value.trim();
        const avatarUrl = document.getElementById('avatar-input').value.trim();
        
        if (!nick) {
            alert("Пожалуйста, введите никнейм!");
            return;
        }

        currentUser = nick;
        currentAvatar = avatarUrl || `https://ui-avatars.com/api/?name=${nick}&background=random`;
        
        localStorage.setItem('chat_nickname', currentUser);
        localStorage.setItem('chat_avatar', currentAvatar);
        
        initApp();
    };

    // Отправка по нажатию Enter
    document.getElementById("message-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });

    // Функция отправки сообщения
    window.sendMessage = () => {
        const text = document.getElementById('message-input').value.trim();
        if (!text || !currentUser) return;

        // Отправляем в конкретный чат (глобальный или ЛС)
        const chatRef = ref(db, `messages/${currentChatMode}`);
        push(chatRef, { 
            sender: currentUser, 
            avatar: currentAvatar,
            text: text, 
            timestamp: Date.now() 
        });

        document.getElementById('message-input').value = '';
    };

    // Функция открытия личных сообщений (ЛС)
    window.openChat = (targetUser) => {
        if (targetUser === 'global') {
            currentChatMode = 'global';
            currentChatName = 'Общий чат';
        } else {
            // Создаем уникальный ID чата для двух людей (сортируем по алфавиту)
            currentChatMode = [currentUser, targetUser].sort().join('_');
            currentChatName = `Чат с ${targetUser}`;
        }
        
        document.getElementById('chat-header').innerText = currentChatName;
        loadMessages();
    };

    // Загрузка сообщений текущего чата
    function loadMessages() {
        const chatRef = ref(db, `messages/${currentChatMode}`);
        
        // Если уже слушали другой чат - отключаемся от старого
        if (messagesListener) {
            messagesListener();
        }

        const msgsContainer = document.getElementById('messages');
        msgsContainer.innerHTML = ''; // Очищаем экран перед загрузкой

        messagesListener = onValue(chatRef, (snapshot) => {
            msgsContainer.innerHTML = '';
            snapshot.forEach((child) => {
                const data = child.val();
                const isMe = data.sender === currentUser;
                const alignmentClass = isMe ? 'me' : 'them';
                
                msgsContainer.innerHTML += `
                    <div class="msg-wrapper ${alignmentClass}">
                        <div class="msg-sender">${data.sender}</div>
                        <div class="msg-bubble">${data.text}</div>
                    </div>
                `;
            });
            msgsContainer.scrollTop = msgsContainer.scrollHeight;
        });
    }

    // Инициализация всего функционала после входа
    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('my-name').innerText = currentUser;
        document.getElementById('my-avatar').src = currentAvatar;

        // --- 1. СИСТЕМА ОНЛАЙН СТАТУСОВ ---
        const userRef = ref(db, `users/${currentUser}`);
        const connectedRef = ref(db, '.info/connected');

        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                // Если подключились к базе, ставим статус online = true
                set(userRef, { nickname: currentUser, avatar: currentAvatar, online: true });
                // Если окно закроют или оборвется инет, сервер сам поставит online = false
                onDisconnect(userRef).update({ online: false });
            }
        });

        // --- 2. ЗАГРУЗКА СПИСКА КОНТАКТОВ ---
        const usersListRef = ref(db, 'users');
        onValue(usersListRef, (snapshot) => {
            const listContainer = document.getElementById('user-list');
            
            // Оставляем кнопку общего чата всегда первой
            let html = `
                <div class="contact" onclick="openChat('global')">
                    <img src="https://cdn-icons-png.flaticon.com/512/615/615075.png" class="avatar">
                    <div class="contact-info">
                        <div class="contact-name">🌍 Общий чат</div>
                    </div>
                </div>
            `;

            snapshot.forEach((child) => {
                const user = child.val();
                // Себя в списке контактов не показываем
                if (user.nickname !== currentUser) {
                    const statusClass = user.online ? 'online' : '';
                    html += `
                        <div class="contact" onclick="openChat('${user.nickname}')">
                            <img src="${user.avatar}" class="avatar">
                            <div class="contact-info">
                                <div class="contact-name">${user.nickname}</div>
                            </div>
                            <div class="status-dot ${statusClass}"></div>
                        </div>
                    `;
                }
            });
            listContainer.innerHTML = html;
        });

        // Открываем глобальный чат по умолчанию
        openChat('global');
    }

    // Проверка, есть ли сохраненная сессия при обновлении страницы
    if (currentUser) {
        initApp();
    }
</script>
</body>
</html>
