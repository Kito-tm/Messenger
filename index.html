<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Clone Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; height: 100vh; background: #eef2f5; overflow: hidden; }
        
        /* Экран авторизации / Редактирования профиля */
        #login-screen, #profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f6f9; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #profile-modal { display: none; background: rgba(0,0,0,0.5); z-index: 9998; }
        .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); text-align: center; width: 90%; max-width: 360px; }
        .login-box h2 { margin-bottom: 20px; color: #222; font-size: 22px; }
        .login-box input[type="text"] { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #dadfe3; font-size: 16px; outline: none; }
        .login-box button { width: 100%; padding: 14px; background: #248bcf; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .login-box button:hover { background: #1c72ab; }
        
        /* Кнопка выбора фото */
        .file-input-label { display: inline-block; padding: 10px 15px; background: #f0f3f6; border-radius: 8px; cursor: pointer; font-size: 14px; color: #555; margin-bottom: 15px; font-weight: 500; }
        .file-input-label:hover { background: #e4e8ed; }
        #avatar-file, #modal-avatar-file { display: none; }
        .preview-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px auto; border: 2px solid #248bcf; display: none; }

        /* Боковое меню */
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #e6ebee; display: flex; flex-direction: column; height: 100%; z-index: 10; transition: transform 0.3s cubic-bezier(0.1, 0.8, 0.2, 1); }
        .sidebar-header { padding: 15px; background: #fff; border-bottom: 1px solid #e6ebee; display: flex; align-items: center; justify-content: space-between; }
        .profile-trigger { display: flex; align-items: center; cursor: pointer; }
        .my-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 12px; background: #eee; }
        .my-name { font-weight: 600; font-size: 16px; color: #222; }
        .settings-icon { font-size: 20px; color: #707579; cursor: pointer; padding: 5px; }

        /* Элементы списков */
        #global-chat-tab { padding: 14px 16px; background: #fff; border-bottom: 4px solid #f4f6f9; display: flex; align-items: center; cursor: pointer; position: relative; }
        #global-chat-tab:hover { background: #f4f6f9; }
        .global-icon { width: 48px; height: 48px; border-radius: 50%; background: #248bcf; color: white; display: flex; justify-content: center; align-items: center; font-size: 22px; margin-right: 15px; }
        .global-info { flex: 1; font-weight: 600; font-size: 15px; }
        .unread-indicator { width: 10px; height: 10px; background: #31b545; border-radius: 50%; display: none; position: absolute; right: 20px; }

        #user-list { flex: 1; overflow-y: auto; }
        .contact { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f8fafb; position: relative; }
        .contact:hover, .contact.active { background: #f2f6fa; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #eee; }
        .contact-info { flex: 1; }
        .contact-name { font-weight: 600; font-size: 15px; color: #222; margin-bottom: 2px; }
        .status-text { font-size: 13px; color: #999; }
        .status-text.online { color: #248bcf; font-weight: 500; }
        .status-dot { width: 9px; height: 9px; border-radius: 50%; background: #ccc; position: absolute; left: 55px; top: 48px; border: 2px solid #fff; }
        .status-dot.online { background: #31b545; }

        /* Зона чата */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #f4f6f9; position: relative; height: 100%; }
        #chat-header { padding: 14px 20px; background: #fff; border-bottom: 1px solid #e6ebee; font-weight: 600; font-size: 16px; display: flex; align-items: center; }
        #back-btn { display: none; margin-right: 15px; font-size: 20px; cursor: pointer; background: none; border: none; color: #248bcf; outline: none; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        /* Разделитель дат */
        .date-separator { align-self: center; background: rgba(122, 139, 153, 0.4); color: #fff; font-size: 13px; font-weight: 500; padding: 4px 12px; border-radius: 12px; margin: 15px 0; }

        /* Пузыри сообщений */
        .msg-wrapper { display: flex; margin-bottom: 8px; flex-direction: column; max-width: 75%; position: relative; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.them { align-self: flex-start; align-items: flex-start; }
        .msg-sender { font-size: 13px; color: #248bcf; font-weight: 600; margin-bottom: 2px; margin-left: 4px; }
        .msg-bubble { padding: 8px 14px 6px 14px; border-radius: 16px; font-size: 15px; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.07); position: relative; display: flex; flex-direction: column; }
        .msg-wrapper.me .msg-bubble { background: #eff7ff; color: #0b1e2c; border-bottom-right-radius: 4px; }
        .msg-wrapper.them .msg-bubble { background: #ffffff; color: #000000; border-bottom-left-radius: 4px; }
        
        /* Время и Галочки */
        .msg-meta { display: flex; align-items: center; justify-content: flex-end; font-size: 11px; color: #a0acb6; margin-top: 3px; align-self: flex-end; }
        .msg-wrapper.me .msg-meta { color: #7cb0d4; }
        .msg-check { margin-left: 4px; font-weight: bold; font-size: 12px; display: flex; }

        /* Поле ввода */
        #input-area { display: flex; padding: 12px 20px; background: #fff; align-items: center; border-top: 1px solid #e6ebee; }
        #message-input { flex: 1; padding: 12px 18px; border-radius: 22px; border: 1px solid #e6ebee; background: #f4f6f9; outline: none; font-size: 15px; }
        #send-btn { margin-left: 12px; width: 44px; height: 44px; border-radius: 50%; background: #248bcf; color: white; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        #send-btn:hover { background: #1c72ab; }
        #send-btn svg { width: 20px; height: 20px; fill: white; margin-left: 2px; }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; left: 0; top: 0; height: 100%; }
            #sidebar.hidden-mobile { transform: translateX(-100%); }
            #chat-area { width: 100%; position: absolute; left: 0; top: 0; z-index: 5; height: 100%; }
            #back-btn { display: block; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>Создать профиль</h2>
        <img id="login-preview" class="preview-avatar">
        <label class="file-input-label">Выбрать фото из галереи
            <input type="file" id="avatar-file" accept="image/*" onchange="processAvatar(event, 'login-preview')">
        </label>
        <input type="text" id="nickname-input" placeholder="Ваш никнейм">
        <button onclick="login()">Войти в мессенджер</button>
    </div>
</div>

<div id="profile-modal" onclick="toggleProfileModal(false)">
    <div class="login-box" onclick="event.stopPropagation()">
        <h2>Редактировать профиль</h2>
        <img id="modal-preview" class="preview-avatar" style="display:block;">
        <label class="file-input-label">Обновить фото профиля
            <input type="file" id="modal-avatar-file" accept="image/*" onchange="processAvatar(event, 'modal-preview')">
        </label>
        <input type="text" id="modal-nickname-input" placeholder="Новый никнейм">
        <button onclick="updateProfile()">Сохранить изменения</button>
        <button onclick="toggleProfileModal(false)" style="background:#bbb; margin-top: 8px;">Отмена</button>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <div class="profile-trigger" onclick="openProfileSettings()">
            <img id="my-avatar" src="" class="my-avatar">
            <div class="my-name" id="my-name">Загрузка...</div>
        </div>
        <div class="settings-icon" onclick="openProfileSettings()">⚙</div>
    </div>
    
    <div id="global-chat-tab" onclick="openChat('global')">
        <div class="global-icon">🌍</div>
        <div class="global-info">Общий чат</div>
        <div class="unread-indicator" id="global-unread"></div>
    </div>

    <div id="user-list"></div>
</div>

<div id="chat-area">
    <div id="chat-header">
        <button id="back-btn" onclick="closeChat()">⬅</button>
        <span id="chat-title">Выберите чат</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Напишите сообщение...">
        <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // ВАША КОНФИГУРАЦИЯ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyCTDqpLLsbolvQlxGEqUZLR561Irsq57Po",
        authDomain: "messenger-2e22b.firebaseapp.com",
        databaseURL: "https://messenger-2e22b-default-rtdb.firebaseio.com", 
        projectId: "messenger-2e22b",
        storageBucket: "messenger-2e22b.firebasestorage.app",
        messagingSenderId: "568767713950",
        appId: "1:568767713950:web:36d347ceaf13a5d865e18f",
        measurementId: "G-HQGTN4Q6HX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = localStorage.getItem('chat_nickname');
    let currentAvatar = localStorage.getItem('chat_avatar');
    let currentChatMode = 'global'; 
    let currentChatName = 'Общий чат';
    let messagesListener = null; 
    let compressedAvatarBase64 = "";

    // ИСПРАВЛЕННЫЙ метод обработки и сжатия фото из галереи
    window.processAvatar = (event, previewId) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 128; 
                const MAX_HEIGHT = 128;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                } else {
                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                }
                canvas.width = width;
                canvas.height = height;
                
                // Исправлено: режим '2d' без лишнего мусора
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                compressedAvatarBase64 = canvas.toDataURL('image/jpeg', 0.7); 
                const preview = document.getElementById(previewId);
                preview.src = compressedAvatarBase64;
                preview.style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    };

    window.login = () => {
        let nick = document.getElementById('nickname-input').value.trim();
        if (!nick) return alert("Введите никнейм!");
        nick = nick.replace(/[.#$\[\]]/g, ''); 

        currentUser = nick;
        currentAvatar = compressedAvatarBase64 || `https://ui-avatars.com/api/?name=${nick}&background=random&color=fff`;
        
        localStorage.setItem('chat_nickname', currentUser);
        localStorage.setItem('chat_avatar', currentAvatar);
        initApp();
    };

    window.openProfileSettings = () => {
        document.getElementById('modal-nickname-input').value = currentUser;
        document.getElementById('modal-preview').src = currentAvatar;
        document.getElementById('modal-preview').style.display = 'block';
        compressedAvatarBase64 = currentAvatar;
        toggleProfileModal(true);
    };

    window.toggleProfileModal = (show) => {
        document.getElementById('profile-modal').style.display = show ? 'flex' : 'none';
    };

    window.updateProfile = () => {
        let newNick = document.getElementById('modal-nickname-input').value.trim().replace(/[.#$\[\]]/g, '');
        if (!newNick) return alert("Никнейм не может быть пустым!");

        if(newNick !== currentUser) {
            set(ref(db, `users/${currentUser}`), null);
        }

        currentUser = newNick;
        currentAvatar = compressedAvatarBase64 || currentAvatar;

        localStorage.setItem('chat_nickname', currentUser);
        localStorage.setItem('chat_avatar', currentAvatar);

        set(ref(db, `users/${currentUser}`), { nickname: currentUser, avatar: currentAvatar, online: true });
        
        initApp();
        toggleProfileModal(false);
    };

    window.closeChat = () => { document.getElementById('sidebar').classList.remove('hidden-mobile'); };
    function showChatForMobile() { if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hidden-mobile'); }

    document.getElementById("message-input").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

    window.sendMessage = () => {
        const text = document.getElementById('message-input').value.trim();
        if (!text || !currentUser) return;

        const chatRef = ref(db, `messages/${currentChatMode}`);
        push(chatRef, { 
            sender: currentUser, 
            text: text, 
            timestamp: Date.now(),
            read: false
        });
        document.getElementById('message-input').value = '';
    };

    window.openChat = (targetUser) => {
        if (targetUser === 'global') {
            currentChatMode = 'global';
            currentChatName = 'Общий чат';
            document.getElementById('global-unread').style.display = 'none';
        } else {
            currentChatMode = [currentUser, targetUser].sort().join('_');
            currentChatName = targetUser;
        }
        document.getElementById('chat-title').innerText = currentChatName;
        showChatForMobile();
        loadMessages();
    };

    function formatMessageDate(timestamp) {
        const date = new Date(timestamp);
        const today = new Date();
        const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);

        if (date.toDateString() === today.toDateString()) return 'Сегодня';
        if (date.toDateString() === yesterday.toDateString()) return 'Вчера';
        
        return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
    }

    function loadMessages() {
        const chatRef = ref(db, `messages/${currentChatMode}`);
        if (messagesListener) messagesListener(); 

        const msgsContainer = document.getElementById('messages');
        msgsContainer.innerHTML = ''; 

        messagesListener = onValue(chatRef, (snapshot) => {
            msgsContainer.innerHTML = '';
            let lastDateStr = "";

            snapshot.forEach((child) => {
                const msgId = child.key;
                const data = child.val();
                const isMe = data.sender === currentUser;
                
                if (!isMe && !data.read && currentChatMode !== 'global') {
                    update(ref(db, `messages/${currentChatMode}/${msgId}`), { read: true });
                }

                const msgDateStr = formatMessageDate(data.timestamp);
                if (msgDateStr !== lastDateStr) {
                    msgsContainer.innerHTML += `<div class="date-separator">${msgDateStr}</div>`;
                    lastDateStr = msgDateStr;
                }

                const timeStr = new Date(data.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                const alignmentClass = isMe ? 'me' : 'them';
                
                let ticks = '';
                if (currentChatMode !== 'global' && isMe) {
                    ticks = data.read ? '✓✓' : '✓';
                }

                msgsContainer.innerHTML += `
                    <div class="msg-wrapper ${alignmentClass}">
                        ${(!isMe && currentChatMode === 'global') ? `<div class="msg-sender">${data.sender}</div>` : ''}
                        <div class="msg-bubble">
                            <div>${data.text}</div>
                            <div class="msg-meta">
                                <span>${timeStr}</span>
                                <span class="msg-check">${ticks}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            msgsContainer.scrollTop = msgsContainer.scrollHeight;
        });
    }

    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('my-name').innerText = currentUser;
        document.getElementById('my-avatar').src = currentAvatar;

        const userRef = ref(db, `users/${currentUser}`);
        const connectedRef = ref(db, '.info/connected');

        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                set(userRef, { nickname: currentUser, avatar: currentAvatar, online: true });
                onDisconnect(userRef).update({ online: false });
            }
        });

        onValue(ref(db, 'users'), (snapshot) => {
            const listContainer = document.getElementById('user-list');
            let html = '';
            snapshot.forEach((child) => {
                const user = child.val();
                if (user.nickname !== currentUser) {
                    const statusClass = user.online ? 'online' : '';
                    const statusText = user.online ? 'в сети' : 'был(а) недавно';
                    html += `
                        <div class="contact" onclick="openChat('${user.nickname}')">
                            <img src="${user.avatar}" class="avatar">
                            <div class="status-dot ${statusClass}"></div>
                            <div class="contact-info">
                                <div class="contact-name">${user.nickname}</div>
                                <div class="status-text ${statusClass}">${statusText}</div>
                            </div>
                        </div>
                    `;
                }
            });
            listContainer.innerHTML = html;
        });

        let isFirstLoad = true;
        let lastMessageCount = 0;
        onValue(ref(db, 'messages/global'), (snapshot) => {
