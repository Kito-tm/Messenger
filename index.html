<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: #e5ddd5; overflow: hidden; }
        
        /* Экран авторизации */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        .login-box h2 { margin-bottom: 20px; color: #333; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; outline: none; }
        .login-box button { width: 100%; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* Левое меню (Списки контактов) */
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; height: 100%; z-index: 10; transition: transform 0.3s ease; }
        .sidebar-header { padding: 15px; background: #f0f2f5; border-bottom: 1px solid #ddd; display: flex; align-items: center; }
        .my-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 15px; }
        .my-name { font-weight: bold; font-size: 16px; }

        /* Вкладка общего чата */
        #global-chat-tab { padding: 15px; background: #fff; border-bottom: 5px solid #f0f2f5; display: flex; align-items: center; cursor: pointer; }
        #global-chat-tab:hover { background: #f5f5f5; }
        .global-icon { width: 45px; height: 45px; border-radius: 50%; background: #0088cc; color: white; display: flex; justify-content: center; align-items: center; font-size: 20px; margin-right: 15px; }
        .global-info { flex: 1; font-weight: bold; font-size: 16px; }
        .unread-indicator { width: 12px; height: 12px; background: #25d366; border-radius: 50%; display: none; }

        /* Список пользователей */
        #user-list { flex: 1; overflow-y: auto; }
        .contact { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
        .contact:hover, .contact.active { background: #ebebeb; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #ccc; }
        .contact-info { flex: 1; }
        .contact-name { font-weight: bold; font-size: 15px; color: #333; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #bbb; margin-left: auto; }
        .status-dot.online { background: #25d366; box-shadow: 0 0 5px #25d366; }

        /* Правая часть (Сам чат) */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #efeae2; position: relative; height: 100%; }
        #chat-header { padding: 12px 15px; background: #f0f2f5; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 16px; display: flex; align-items: center; }
        #back-btn { display: none; margin-right: 15px; font-size: 20px; cursor: pointer; background: none; border: none; color: #0088cc; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* Сообщения */
        .msg-wrapper { display: flex; margin-bottom: 15px; flex-direction: column; max-width: 80%; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.them { align-self: flex-start; align-items: flex-start; }
        .msg-sender { font-size: 12px; color: #666; margin-bottom: 4px; margin-left: 5px; margin-right: 5px; }
        .msg-bubble { padding: 10px 14px; border-radius: 15px; font-size: 15px; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-wrapper.me .msg-bubble { background: #dcf8c6; border-bottom-right-radius: 0; }
        .msg-wrapper.them .msg-bubble { background: #ffffff; border-bottom-left-radius: 0; }

        /* Поле ввода */
        #input-area { display: flex; padding: 10px; background: #f0f2f5; align-items: center; }
        #message-input { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; outline: none; font-size: 15px; }
        #send-btn { margin-left: 10px; width: 45px; height: 45px; border-radius: 50%; background: #0088cc; color: white; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        #send-btn:hover { background: #006699; }
        #send-btn svg { width: 20px; height: 20px; fill: white; margin-left: 3px; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ (как настоящее приложение) */
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; left: 0; top: 0; }
            #sidebar.hidden-mobile { transform: translateX(-100%); }
            #chat-area { width: 100%; position: absolute; left: 0; top: 0; z-index: 5; }
            #back-btn { display: block; } /* Показываем кнопку назад на телефонах */
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>Вход</h2>
        <input type="text" id="nickname-input" placeholder="Никнейм (без спецсимволов)">
        <input type="text" id="avatar-input" placeholder="Ссылка на фото (необязательно)">
        <button onclick="login()">Начать общение</button>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <img id="my-avatar" src="" class="my-avatar">
        <div class="my-name" id="my-name"></div>
    </div>
    
    <div id="global-chat-tab" onclick="openChat('global')">
        <div class="global-icon">🌍</div>
        <div class="global-info">Общий чат</div>
        <div class="unread-indicator" id="global-unread"></div>
    </div>

    <div id="user-list">
        </div>
</div>

<div id="chat-area">
    <div id="chat-header">
        <button id="back-btn" onclick="closeChat()">⬅</button>
        <span id="chat-title">Общий чат</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Сообщение...">
        <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // ВАШИ КЛЮЧИ FIREBASE (Добавлен databaseURL для 100% коннекта)
    const firebaseConfig = {
        apiKey: "AIzaSyCTDqpLLsbolvQlxGEqUZLR561Irsq57Po",
        authDomain: "messenger-2e22b.firebaseapp.com",
        databaseURL: "https://messenger-2e22b-default-rtdb.firebaseio.com/", 
        projectId: "messenger-2e22b",
        storageBucket: "messenger-2e22b.firebasestorage.app",
        messagingSenderId: "568767713950",
        appId: "1:568767713950:web:36d347ceaf13a5d865e18f",
        measurementId: "G-HQGTN4Q6HX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = localStorage.getItem('chat_nickname');
    let currentAvatar = localStorage.getItem('chat_avatar');
    let currentChatMode = 'global'; 
    let currentChatName = 'Общий чат';
    let messagesListener = null; 

    // Функция входа
    window.login = () => {
        let nick = document.getElementById('nickname-input').value.trim();
        const avatarUrl = document.getElementById('avatar-input').value.trim();
        
        if (!nick) return alert("Введите никнейм!");
        
        // Очищаем ник от точек и спецсимволов (Firebase не любит их в путях)
        nick = nick.replace(/[.#$\[\]]/g, ''); 

        currentUser = nick;
        currentAvatar = avatarUrl || `https://ui-avatars.com/api/?name=${nick}&background=random&color=fff`;
        
        localStorage.setItem('chat_nickname', currentUser);
        localStorage.setItem('chat_avatar', currentAvatar);
        
        initApp();
    };

    // Управление интерфейсом мобилки
    window.closeChat = () => {
        document.getElementById('sidebar').classList.remove('hidden-mobile');
    };
    
    function showChatForMobile() {
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.add('hidden-mobile');
        }
    }

    // Отправка по нажатию Enter
    document.getElementById("message-input").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    window.sendMessage = () => {
        const text = document.getElementById('message-input').value.trim();
        if (!text || !currentUser) return;

        const chatRef = ref(db, `messages/${currentChatMode}`);
        push(chatRef, { 
            sender: currentUser, 
            text: text, 
            timestamp: Date.now() 
        });

        document.getElementById('message-input').value = '';
    };

    window.openChat = (targetUser) => {
        // Убираем зеленую точку, если открыли общий чат
        if (targetUser === 'global') {
            currentChatMode = 'global';
            currentChatName = 'Общий чат';
            document.getElementById('global-unread').style.display = 'none';
        } else {
            currentChatMode = [currentUser, targetUser].sort().join('_');
            currentChatName = targetUser;
        }
        
        document.getElementById('chat-title').innerText = currentChatName;
        showChatForMobile();
        loadMessages();
    };

    function loadMessages() {
        const chatRef = ref(db, `messages/${currentChatMode}`);
        if (messagesListener) messagesListener(); // Отключаем старую прослушку

        const msgsContainer = document.getElementById('messages');
        msgsContainer.innerHTML = ''; 

        messagesListener = onValue(chatRef, (snapshot) => {
            msgsContainer.innerHTML = '';
            snapshot.forEach((child) => {
                const data = child.val();
                const isMe = data.sender === currentUser;
                const alignmentClass = isMe ? 'me' : 'them';
                
                msgsContainer.innerHTML += `
                    <div class="msg-wrapper ${alignmentClass}">
                        ${!isMe ? `<div class="msg-sender">${data.sender}</div>` : ''}
                        <div class="msg-bubble">${data.text}</div>
                    </div>
                `;
            });
            msgsContainer.scrollTop = msgsContainer.scrollHeight;
        });
    }

    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('my-name').innerText = currentUser;
        document.getElementById('my-avatar').src = currentAvatar;

        // 1. СТАТУС В СЕТИ
        const userRef = ref(db, `users/${currentUser}`);
        const connectedRef = ref(db, '.info/connected');

        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                set(userRef, { nickname: currentUser, avatar: currentAvatar, online: true });
                onDisconnect(userRef).update({ online: false });
            }
        });

        // 2. СПИСОК КОНТАКТОВ
        const usersListRef = ref(db, 'users');
        onValue(usersListRef, (snapshot) => {
            const listContainer = document.getElementById('user-list');
            let html = '';

            snapshot.forEach((child) => {
                const user = child.val();
                if (user.nickname !== currentUser) {
                    const statusClass = user.online ? 'online' : '';
                    html += `
                        <div class="contact" onclick="openChat('${user.nickname}')">
                            <img src="${user.avatar}" class="avatar">
                            <div class="contact-info">
                                <div class="contact-name">${user.nickname}</div>
                            </div>
                            <div class="status-dot ${statusClass}"></div>
                        </div>
                    `;
                }
            });
            listContainer.innerHTML = html;
        });

        // 3. ОТСЛЕЖИВАНИЕ НОВЫХ СООБЩЕНИЙ В ОБЩЕМ ЧАТЕ
        let isFirstLoad = true;
        let lastMessageCount = 0;
        
        onValue(ref(db, 'messages/global'), (snapshot) => {
            const currentCount = snapshot.size;
            
            if (!isFirstLoad && currentCount > lastMessageCount && currentChatMode !== 'global') {
                // Если мы не в общем чате и пришло новое сообщение - показываем зеленую точку
                document.getElementById('global-unread').style.display = 'block';
            }
            
            lastMessageCount = currentCount;
            isFirstLoad = false;
        });

        // При запуске показываем контакты (не открываем чат сразу на мобилках)
        if (window.innerWidth > 768) {
            openChat('global');
        }
    }

    if (currentUser) {
        initApp();
    }
</script>
</body>
</html>
