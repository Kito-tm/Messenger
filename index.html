<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <style>
        body { margin: 0; background: #f0f2f5; font-family: sans-serif; }
        #header { background: #0088cc; color: white; padding: 15px; }
        #chat { height: 70vh; overflow-y: scroll; padding: 10px; }
        .msg { background: white; padding: 10px; margin: 5px; border-radius: 15px; max-width: 80%; }
        #input-box { position: fixed; bottom: 0; width: 100%; display: flex; padding: 10px; background: white; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; }
        button { margin-left: 10px; padding: 10px 20px; background: #0088cc; color: white; border: none; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="header">Мой Мессенджер</div>
    <div id="chat"><div class="msg">Привет! Мессенджер готов.</div></div>
    <div id="input-box">
        <input id="msgInput" placeholder="Введите сообщение...">
        <button onclick="send()">></button>
    </div>
    <script>
        function send() {
            let input = document.getElementById('msgInput');
            if(input.value) {
                document.getElementById('chat').innerHTML += `<div class="msg">Вы: ${input.value}</div>`;
                input.value = '';
            }
        }
    </script>
</body>
</html>
